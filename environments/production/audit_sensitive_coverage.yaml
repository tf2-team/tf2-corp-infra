known_gaps:
  - id: legacy-cloudtrail-us-west-2
    resource: aws-cloudtrail-logs-493499579600-7f0b69bb
    reason: Legacy CloudTrail bucket outside the MD12 production demo trail scope.
  - id: legacy-tfstate-capstone
    resource: tfstate-capstone-tf2
    reason: Legacy Terraform state bucket; add to s3_object_prefixes if still active during demo.
  - id: audit-events-bucket
    resource: techx-prod-tf2-audit-events
    reason: Existing audit pipeline bucket; deferred until owner and data retention semantics are confirmed.
  - id: account-wide-s3-data-events
    resource: all other S3 buckets
    reason: Deliberately not enabled account-wide to control CloudTrail data-event cost and noise.
