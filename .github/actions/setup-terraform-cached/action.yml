name: Setup Terraform with provider cache
description: Install Terraform and restore/save the provider plugin cache for faster init

inputs:
  terraform_version:
    description: Terraform CLI version to install
    required: false
    default: "1.10.5"
  terraform_wrapper:
    description: Wrap terraform with the setup-terraform wrapper (disable for real exit codes)
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Create provider plugin cache directory
      shell: bash
      run: |
        cache_dir="${{ github.workspace }}/.terraform.d/plugin-cache"
        mkdir -p "${cache_dir}"
        echo "TF_PLUGIN_CACHE_DIR=${cache_dir}" >> "${GITHUB_ENV}"

    - name: Cache Terraform providers
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ${{ github.workspace }}/.terraform.d/plugin-cache
        key: tf-plugin-${{ runner.os }}-${{ hashFiles('**/.terraform.lock.hcl') }}
        restore-keys: |
          tf-plugin-${{ runner.os }}-

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
      with:
        terraform_version: ${{ inputs.terraform_version }}
        terraform_wrapper: ${{ inputs.terraform_wrapper }}
# Change trail: @hungxqt - 2026-07-20 - Bump cache and setup-terraform to Node 24 runtimes.
