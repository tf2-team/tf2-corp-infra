# Manual production promote only (workflow_dispatch).
# Do not re-add push triggers; validate in development first.
name: Promote Production

on:
  workflow_dispatch:
    inputs:
      plan_only:
        description: "Create and upload a production plan without applying it"
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-state-production
  cancel-in-progress: false

jobs:
  apply-production:
    uses: ./.github/workflows/terraform-apply.yml
    with:
      environment: production
      terraform_dir: environments/production
      plan_only: ${{ inputs.plan_only }}
    secrets: inherit
