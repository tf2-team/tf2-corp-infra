name: Terraform Destroy Dev

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type destroy-dev to proceed"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-state-dev
  cancel-in-progress: false

env:
  TF_VERSION: "1.10.5"
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"

jobs:
  validate-confirm:
    name: Validate confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Verify confirmation phrase
        if: ${{ inputs.confirm != 'destroy-dev' }}
        run: |
          echo "Confirmation string mismatch; expected destroy-dev."
          exit 1
      - name: Confirmation accepted
        if: ${{ inputs.confirm == 'destroy-dev' }}
        run: echo "Confirmation accepted."

  destroy-dev:
    name: Destroy Dev
    needs: validate-confirm
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS credentials for dev
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.DEV_AWS_APPLY_ROLE_ARN }}
          aws-region: ${{ secrets.DEV_AWS_REGION }}

      - name: Terraform init dev
        env:
          TF_BACKEND_BUCKET: ${{ secrets.DEV_TF_BACKEND_BUCKET }}
          TF_BACKEND_REGION: ${{ secrets.DEV_TF_BACKEND_REGION }}
        run: |
          terraform -chdir=environments/development init \
            -backend-config="bucket=${TF_BACKEND_BUCKET}" \
            -backend-config="region=${TF_BACKEND_REGION}"

      - name: Terraform destroy dev
        run: |
          terraform -chdir=environments/development destroy -auto-approve
