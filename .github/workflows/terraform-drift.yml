name: Terraform Drift Detection

on:
  schedule:
    - cron: "0 22 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  issues: write

env:
  TF_VERSION: "1.10.5"
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"

jobs:
  drift:
    name: Drift ${{ matrix.environment }}
    runs-on: ubuntu-latest
    concurrency:
      group: terraform-state-${{ matrix.concurrency_env }}
      cancel-in-progress: false
    env:
      TF_VAR_plan_role_arn: ${{ matrix.environment == 'dev' && secrets.DEV_AWS_PLAN_ROLE_ARN || secrets.PROD_AWS_PLAN_ROLE_ARN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - environment: dev
            concurrency_env: dev
            terraform_dir: environments/development
          - environment: production
            concurrency_env: production
            terraform_dir: environments/production
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS credentials for dev
        if: matrix.environment == 'dev'
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.DEV_AWS_PLAN_ROLE_ARN }}
          aws-region: ${{ secrets.DEV_AWS_REGION }}

      - name: Configure AWS credentials for production
        if: matrix.environment == 'production'
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.PROD_AWS_PLAN_ROLE_ARN }}
          aws-region: ${{ secrets.PROD_AWS_REGION }}

      - name: Terraform init dev
        if: matrix.environment == 'dev'
        env:
          TF_BACKEND_BUCKET: ${{ secrets.DEV_TF_BACKEND_BUCKET }}
          TF_BACKEND_REGION: ${{ secrets.DEV_TF_BACKEND_REGION }}
        run: |
          terraform -chdir=${{ matrix.terraform_dir }} init \
            -backend-config="bucket=${TF_BACKEND_BUCKET}" \
            -backend-config="region=${TF_BACKEND_REGION}"

      - name: Terraform init production
        if: matrix.environment == 'production'
        env:
          TF_BACKEND_BUCKET: ${{ secrets.PROD_TF_BACKEND_BUCKET }}
          TF_BACKEND_REGION: ${{ secrets.PROD_TF_BACKEND_REGION }}
        run: |
          terraform -chdir=${{ matrix.terraform_dir }} init \
            -backend-config="bucket=${TF_BACKEND_BUCKET}" \
            -backend-config="region=${TF_BACKEND_REGION}"

      - name: Drift plan
        id: drift
        shell: bash
        run: |
          set +e
          terraform -chdir=${{ matrix.terraform_dir }} plan -detailed-exitcode -out=tfplan
          status=$?
          set -e
          echo "exitcode=${status}" >> "$GITHUB_OUTPUT"
          if [ "${status}" -eq 1 ]; then
            exit 1
          fi

      - name: Render safe drift summary
        if: steps.drift.outputs.exitcode == '0' || steps.drift.outputs.exitcode == '2'
        shell: bash
        run: |
          chmod +x scripts/render-terraform-plan-summary.sh
          terraform -chdir=${{ matrix.terraform_dir }} show -json tfplan \
            | scripts/render-terraform-plan-summary.sh "${{ matrix.environment }}" \
            | tee drift-summary.md
          {
            echo "## Drift: ${{ matrix.environment }}"
            echo
            cat drift-summary.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload safe drift summary
        if: steps.drift.outputs.exitcode == '0' || steps.drift.outputs.exitcode == '2'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: drift-summary-${{ matrix.environment }}
          path: drift-summary.md
          retention-days: 7

      - name: Manage drift issue
        if: steps.drift.outputs.exitcode == '0' || steps.drift.outputs.exitcode == '2'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const fs = require("fs");
            const env = "${{ matrix.environment }}";
            const exitcode = "${{ steps.drift.outputs.exitcode }}";
            const title = `Terraform drift detected: ${env}`;
            const labelsWanted = ["terraform", "drift", env];

            async function ensureLabel(name) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name,
                });
              } catch (err) {
                if (err.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name,
                    color: name === "drift" ? "d93f0b" : "0e8a16",
                  });
                } else {
                  throw err;
                }
              }
            }

            for (const name of labelsWanted) {
              await ensureLabel(name);
            }

            async function findOpenDriftIssue() {
              let page = 1;
              const per_page = 100;
              while (true) {
                const { data: issues } = await github.rest.issues.listForRepo({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  state: "open",
                  labels: "terraform,drift," + env,
                  per_page,
                  page,
                });
                for (const issue of issues) {
                  if (issue.pull_request) continue;
                  if (issue.title === title) {
                    return issue;
                  }
                }
                if (issues.length < per_page) break;
                page += 1;
              }
              // Fallback: paginate without relying solely on label filter
              page = 1;
              while (true) {
                const { data: issues } = await github.rest.issues.listForRepo({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  state: "open",
                  per_page,
                  page,
                });
                for (const issue of issues) {
                  if (issue.pull_request) continue;
                  if (issue.title === title) {
                    return issue;
                  }
                }
                if (issues.length < per_page) break;
                page += 1;
              }
              return null;
            }

            const existing = await findOpenDriftIssue();

            if (exitcode === "2") {
              const summary = fs.readFileSync("drift-summary.md", "utf8");
              const body = [
                "Scheduled drift detection found infrastructure changes outside Terraform.",
                "",
                summary,
                "",
                `_Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}_`,
              ].join("\n");

              if (existing) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  body,
                  labels: labelsWanted,
                });
              } else {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title,
                  body,
                  labels: labelsWanted,
                });
              }
              return;
            }

            // exitcode 0 — clean
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: [
                  "Drift is no longer detected for this environment.",
                  "",
                  `_Resolved by workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}_`,
                ].join("\n"),
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                state: "closed",
                state_reason: "completed",
              });
            }
