name: Promote Dev

on:
  # Manual only: development is optional for capstone; test/apply prod on push by default.
  # Run this workflow when you intentionally want a development apply.
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  apply-dev:
    uses: ./.github/workflows/terraform-apply.yml
    with:
      environment: dev
      terraform_dir: environments/development
    secrets: inherit
