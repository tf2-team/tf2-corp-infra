# Auto-apply development after merge to techx-dev-corp (path-filtered).
# Production is never auto-applied; see terraform-promote-production.yml.
name: Promote Dev

on:
  push:
    branches:
      - techx-dev-corp
    paths:
      - "environments/development/**"
      - "modules/**"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-state-dev
  cancel-in-progress: false

jobs:
  apply-dev:
    uses: ./.github/workflows/terraform-apply.yml
    with:
      environment: dev
      terraform_dir: environments/development
    secrets: inherit
