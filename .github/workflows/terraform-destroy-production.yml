name: Terraform Destroy Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type destroy-production to proceed"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-state-production
  cancel-in-progress: false

env:
  TF_VERSION: "1.10.5"
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"

jobs:
  validate-confirm:
    name: Validate confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Verify confirmation phrase
        if: ${{ inputs.confirm != 'destroy-production' }}
        run: |
          echo "Confirmation string mismatch; expected destroy-production."
          exit 1
      - name: Confirmation accepted
        if: ${{ inputs.confirm == 'destroy-production' }}
        run: echo "Confirmation accepted."

  destroy-plan:
    name: Plan destroy production
    needs: validate-confirm
    runs-on: ubuntu-latest
    env:
      TF_VAR_plan_role_arn: ${{ secrets.PROD_AWS_PLAN_ROLE_ARN }}
    outputs:
      has_changes: ${{ steps.plan.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS credentials for production plan
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.PROD_AWS_PLAN_ROLE_ARN }}
          aws-region: ${{ secrets.PROD_AWS_REGION }}

      - name: Terraform init production
        env:
          TF_BACKEND_BUCKET: ${{ secrets.PROD_TF_BACKEND_BUCKET }}
          TF_BACKEND_REGION: ${{ secrets.PROD_TF_BACKEND_REGION }}
        run: |
          terraform -chdir=environments/production init \
            -backend-config="bucket=${TF_BACKEND_BUCKET}" \
            -backend-config="region=${TF_BACKEND_REGION}"

      - name: Terraform plan destroy
        id: plan
        shell: bash
        run: |
          set +e
          terraform -chdir=environments/production plan -destroy -detailed-exitcode -out=tfplan
          status=$?
          set -e
          if [ "${status}" -eq 1 ]; then
            exit 1
          fi
          if [ "${status}" -eq 2 ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Render safe plan summary
        if: steps.plan.outputs.has_changes == 'true'
        shell: bash
        run: |
          chmod +x scripts/render-terraform-plan-summary.sh
          mkdir -p plan-artifact
          cp environments/production/tfplan plan-artifact/tfplan
          terraform -chdir=environments/production show -json tfplan \
            | scripts/render-terraform-plan-summary.sh "production" \
            | tee plan-artifact/plan-summary.md
          {
            echo "## Production destroy plan"
            echo
            cat plan-artifact/plan-summary.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload destroy plan artifact
        if: steps.plan.outputs.has_changes == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: terraform-destroy-plan-production
          path: plan-artifact/
          retention-days: 3

      - name: No destroy changes
        if: steps.plan.outputs.has_changes != 'true'
        run: echo "No resources to destroy; skipping Environment approval and apply."

  destroy-apply:
    name: Apply destroy production
    needs: destroy-plan
    if: needs.destroy-plan.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    environment: production
    env:
      TF_VAR_plan_role_arn: ${{ secrets.PROD_AWS_PLAN_ROLE_ARN }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS credentials for production apply
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.PROD_AWS_APPLY_ROLE_ARN }}
          aws-region: ${{ secrets.PROD_AWS_REGION }}

      - name: Terraform init production
        env:
          TF_BACKEND_BUCKET: ${{ secrets.PROD_TF_BACKEND_BUCKET }}
          TF_BACKEND_REGION: ${{ secrets.PROD_TF_BACKEND_REGION }}
        run: |
          terraform -chdir=environments/production init \
            -backend-config="bucket=${TF_BACKEND_BUCKET}" \
            -backend-config="region=${TF_BACKEND_REGION}"

      - name: Download destroy plan
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: terraform-destroy-plan-production
          path: plan-artifact

      - name: Place plan file
        shell: bash
        run: cp plan-artifact/tfplan environments/production/tfplan

      - name: Terraform apply destroy plan
        run: terraform -chdir=environments/production apply -auto-approve tfplan
