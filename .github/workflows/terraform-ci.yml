name: Terraform CI

on:
  pull_request:
    paths:
      - "bootstrap/**"
      - "environments/**"
      - "modules/**"
      - ".github/workflows/**"
      - "scripts/**"
      - ".tflint.hcl"
      - ".checkov.yaml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pull-requests: write
  security-events: write
  actions: read

concurrency:
  group: terraform-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  TF_VERSION: "1.10.5"
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"

jobs:
  static-checks:
    name: Static checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        terraform_dir:
          - bootstrap
          - environments/development
          - environments/production
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt
        run: terraform -chdir=${{ matrix.terraform_dir }} fmt -check -diff

      - name: Terraform init without backend
        run: terraform -chdir=${{ matrix.terraform_dir }} init -backend=false

      - name: Terraform validate
        run: terraform -chdir=${{ matrix.terraform_dir }} validate

  tflint:
    name: TFLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@6e1e0642c0289bd619021bf6b34e3c08ed1e005a # v6.3.0

      - name: Init TFLint plugins
        run: tflint --init

      - name: Run TFLint
        run: tflint --recursive --minimum-failure-severity=error

  checkov:
    name: Checkov IaC scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run Checkov
        id: checkov
        uses: bridgecrewio/checkov-action@7b972723c44fb3d256283fac96fae5d7c1894bb7 # v12.3114.0
        with:
          directory: .
          framework: terraform
          quiet: true
          soft_fail: false
          config_file: .checkov.yaml
          output_format: cli,sarif
          output_file_path: console,results.sarif

      - name: Upload Checkov SARIF artifact
        if: success() || failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: checkov-sarif
          path: results.sarif
          retention-days: 7
          if-no-files-found: warn

      - name: Upload Checkov SARIF to code scanning
        if: success() || failure()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: results.sarif
          category: checkov

  plan:
    name: Plan ${{ matrix.environment }}
    runs-on: ubuntu-latest
    # Dev plan uses Environment `dev` so Environment secrets resolve and OIDC sub
    # is environment:dev. Production plan intentionally has NO Environment so
    # required reviewers on `production` only gate apply (not every PR plan).
    # null omits the Environment key (empty string is not reliable).
    environment: ${{ matrix.github_environment != '' && matrix.github_environment || fromJSON('null') }}
    env:
      TF_VAR_plan_role_arn: ${{ matrix.environment == 'dev' && secrets.DEV_AWS_PLAN_ROLE_ARN || secrets.PROD_AWS_PLAN_ROLE_ARN }}
    needs:
      - static-checks
      - tflint
      - checkov
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    strategy:
      fail-fast: false
      matrix:
        include:
          - environment: dev
            github_environment: dev
            terraform_dir: environments/development
          - environment: production
            github_environment: ""
            terraform_dir: environments/production
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS credentials for dev
        if: matrix.environment == 'dev'
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.DEV_AWS_PLAN_ROLE_ARN }}
          aws-region: ${{ secrets.DEV_AWS_REGION }}

      - name: Configure AWS credentials for production
        if: matrix.environment == 'production'
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.PROD_AWS_PLAN_ROLE_ARN }}
          aws-region: ${{ secrets.PROD_AWS_REGION }}

      - name: Terraform init dev
        if: matrix.environment == 'dev'
        env:
          TF_BACKEND_BUCKET: ${{ secrets.DEV_TF_BACKEND_BUCKET }}
          TF_BACKEND_REGION: ${{ secrets.DEV_TF_BACKEND_REGION }}
        run: |
          terraform -chdir=${{ matrix.terraform_dir }} init \
            -backend-config="bucket=${TF_BACKEND_BUCKET}" \
            -backend-config="region=${TF_BACKEND_REGION}"

      - name: Terraform init production
        if: matrix.environment == 'production'
        env:
          TF_BACKEND_BUCKET: ${{ secrets.PROD_TF_BACKEND_BUCKET }}
          TF_BACKEND_REGION: ${{ secrets.PROD_TF_BACKEND_REGION }}
        run: |
          terraform -chdir=${{ matrix.terraform_dir }} init \
            -backend-config="bucket=${TF_BACKEND_BUCKET}" \
            -backend-config="region=${TF_BACKEND_REGION}"

      - name: Terraform plan
        id: plan
        shell: bash
        run: |
          set +e
          terraform -chdir=${{ matrix.terraform_dir }} plan -out=tfplan -detailed-exitcode
          status=$?
          set -e
          echo "exitcode=${status}" >> "$GITHUB_OUTPUT"
          if [ "${status}" -eq 1 ]; then
            echo "plan_failed=true" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "plan_failed=false" >> "$GITHUB_OUTPUT"

      - name: Render safe plan summary
        if: always() && (steps.plan.outputs.exitcode == '0' || steps.plan.outputs.exitcode == '2')
        shell: bash
        run: |
          chmod +x scripts/render-terraform-plan-summary.sh
          terraform -chdir=${{ matrix.terraform_dir }} show -json tfplan \
            | scripts/render-terraform-plan-summary.sh "${{ matrix.environment }}" \
            | tee plan-summary.md
          {
            echo "## CI plan: ${{ matrix.environment }}"
            echo
            cat plan-summary.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload safe plan summary
        if: always() && (steps.plan.outputs.exitcode == '0' || steps.plan.outputs.exitcode == '2')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ci-plan-summary-${{ matrix.environment }}
          path: plan-summary.md
          retention-days: 7

      - name: Sticky PR plan comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require("fs");
            const env = "${{ matrix.environment }}";
            const marker = `<!-- terraform-plan:${env} -->`;
            const exitcode = "${{ steps.plan.outputs.exitcode }}";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            let body;
            if (exitcode === "1" || exitcode === "") {
              body = [
                marker,
                `### Terraform plan: \`${env}\``,
                "",
                "Plan **failed**. See the workflow run for details (no plan data is published).",
                "",
                `[Workflow run](${runUrl})`,
              ].join("\n");
            } else {
              const summary = fs.readFileSync("plan-summary.md", "utf8");
              body = [
                marker,
                summary,
                "",
                `[Workflow run](${runUrl})`,
              ].join("\n");
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const existing = comments.find(
              (c) =>
                c.user &&
                (c.user.type === "Bot" || c.user.login.endsWith("[bot]")) &&
                c.body &&
                c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
