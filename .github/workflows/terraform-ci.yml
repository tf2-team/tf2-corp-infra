name: Terraform CI

on:
  pull_request:
    paths:
      - "bootstrap/**"
      - "environments/**"
      - "modules/**"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pull-requests: write
  security-events: write

concurrency:
  group: terraform-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  TF_VERSION: "1.10.5"
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"

jobs:
  static-checks:
    name: Static checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        terraform_dir:
          - bootstrap
          - environments/development
          - environments/production
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Terraform
        uses: ./.github/actions/setup-terraform-cached
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: "false"

      - name: Terraform fmt
        run: terraform -chdir=${{ matrix.terraform_dir }} fmt -check -diff

      - name: Terraform init without backend
        run: terraform -chdir=${{ matrix.terraform_dir }} init -backend=false

      - name: Terraform validate
        run: terraform -chdir=${{ matrix.terraform_dir }} validate

      - name: Validate production VPC CNI NetworkPolicy configuration
        if: matrix.terraform_dir == 'environments/production'
        run: terraform -chdir=${{ matrix.terraform_dir }} test

  tflint:
    name: TFLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@6e1e0642c0289bd619021bf6b34e3c08ed1e005a # v6.3.0
        with:
          cache: true

      - name: Run TFLint
        run: tflint --recursive --minimum-failure-severity=error

  checkov:
    name: Checkov IaC scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          quiet: true
          soft_fail: false
          config_file: .checkov.yaml

  plan:
    name: Plan ${{ matrix.environment }}
    runs-on: ubuntu-latest
    env:
      TF_VAR_plan_role_arn: ${{ matrix.environment == 'dev' && secrets.DEV_AWS_PLAN_ROLE_ARN || secrets.PROD_AWS_PLAN_ROLE_ARN }}
    needs:
      - static-checks
      - tflint
      - checkov
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    strategy:
      fail-fast: false
      matrix:
        include:
          - environment: dev
            terraform_dir: environments/development
          - environment: production
            terraform_dir: environments/production
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Terraform
        uses: ./.github/actions/setup-terraform-cached
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: "false"

      - name: Configure AWS credentials for dev
        if: matrix.environment == 'dev'
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.DEV_AWS_PLAN_ROLE_ARN }}
          aws-region: ${{ secrets.DEV_AWS_REGION }}

      - name: Configure AWS credentials for production
        if: matrix.environment == 'production'
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.PROD_AWS_PLAN_ROLE_ARN }}
          aws-region: ${{ secrets.PROD_AWS_REGION }}

      - name: Terraform init dev
        if: matrix.environment == 'dev'
        env:
          TF_BACKEND_BUCKET: ${{ secrets.DEV_TF_BACKEND_BUCKET }}
          TF_BACKEND_REGION: ${{ secrets.DEV_TF_BACKEND_REGION }}
        run: |
          terraform -chdir=${{ matrix.terraform_dir }} init \
            -backend-config="bucket=${TF_BACKEND_BUCKET}" \
            -backend-config="region=${TF_BACKEND_REGION}"

      - name: Terraform init production
        if: matrix.environment == 'production'
        env:
          TF_BACKEND_BUCKET: ${{ secrets.PROD_TF_BACKEND_BUCKET }}
          TF_BACKEND_REGION: ${{ secrets.PROD_TF_BACKEND_REGION }}
        run: |
          terraform -chdir=${{ matrix.terraform_dir }} init \
            -backend-config="bucket=${TF_BACKEND_BUCKET}" \
            -backend-config="region=${TF_BACKEND_REGION}"

      - name: Terraform plan
        id: plan
        shell: bash
        run: |
          set +e
          plan_refresh=true
          if [ "${{ matrix.environment }}" = "production" ]; then
            plan_refresh=false
          fi
          terraform -chdir=${{ matrix.terraform_dir }} plan -refresh=${plan_refresh} -out=tfplan -detailed-exitcode
          status=$?
          echo "exitcode=${status}" >> "$GITHUB_OUTPUT"
          if [ "${status}" -eq 1 ]; then
            exit 1
          fi
          exit 0

      - name: Render plan summary
        if: steps.plan.outputs.exitcode != '0'
        run: terraform -chdir=${{ matrix.terraform_dir }} show -no-color tfplan > plan-${{ matrix.environment }}.txt

      - name: Upload plan artifact
        if: steps.plan.outputs.exitcode != '0'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: terraform-plan-${{ matrix.environment }}
          path: |
            ${{ matrix.terraform_dir }}/tfplan
            plan-${{ matrix.environment }}.txt
          retention-days: 14

      - name: Comment plan on PR
        if: github.event_name == 'pull_request' && steps.plan.outputs.exitcode != '0'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require("fs");
            const plan = fs.readFileSync("plan-${{ matrix.environment }}.txt", "utf8");
            const body = [
              "### Terraform plan: `${{ matrix.environment }}`",
              "",
              "```terraform",
              plan.slice(0, 60000),
              "```"
            ].join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
