name: Terraform CI

on:
  pull_request:
    paths:
      - "bootstrap/**"
      - "environments/**"
      - "modules/**"
      - ".github/workflows/**"
      - "scripts/**"
      - ".tflint.hcl"
      - ".checkov.yaml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pull-requests: write
  security-events: write
  actions: read

concurrency:
  group: terraform-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  TF_VERSION: "1.10.5"
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"

jobs:
  static-checks:
    name: Static checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        terraform_dir:
          - bootstrap
          - environments/development
          - environments/production
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt
        run: terraform -chdir=${{ matrix.terraform_dir }} fmt -check -diff

      - name: Terraform init without backend
        run: terraform -chdir=${{ matrix.terraform_dir }} init -backend=false

      - name: Terraform validate
        run: terraform -chdir=${{ matrix.terraform_dir }} validate

  tflint:
    name: TFLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@90f302c255ef959cbfb4bd10581afecdb7ece3e6 # v4

      - name: Init TFLint plugins
        run: tflint --init

      - name: Run TFLint
        run: tflint --recursive --minimum-failure-severity=error

  checkov:
    name: Checkov IaC scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run Checkov
        id: checkov
        uses: bridgecrewio/checkov-action@7b972723c44fb3d256283fac96fae5d7c1894bb7 # v12
        with:
          directory: .
          framework: terraform
          quiet: true
          soft_fail: false
          config_file: .checkov.yaml
          output_format: cli,sarif
          output_file_path: console,results.sarif

      - name: Upload Checkov SARIF artifact
        if: success() || failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: checkov-sarif
          path: results.sarif
          retention-days: 7
          if-no-files-found: warn

      - name: Upload Checkov SARIF to code scanning
        if: success() || failure()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        with:
          sarif_file: results.sarif
          category: checkov

  plan:
    name: Plan ${{ matrix.environment }}
    runs-on: ubuntu-latest
    env:
      TF_VAR_plan_role_arn: ${{ matrix.environment == 'dev' && secrets.DEV_AWS_PLAN_ROLE_ARN || secrets.PROD_AWS_PLAN_ROLE_ARN }}
    needs:
      - static-checks
      - tflint
      - checkov
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    strategy:
      fail-fast: false
      matrix:
        include:
          - environment: dev
            terraform_dir: environments/development
          - environment: production
            terraform_dir: environments/production
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS credentials for dev
        if: matrix.environment == 'dev'
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.DEV_AWS_PLAN_ROLE_ARN }}
          aws-region: ${{ secrets.DEV_AWS_REGION }}

      - name: Configure AWS credentials for production
        if: matrix.environment == 'production'
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.PROD_AWS_PLAN_ROLE_ARN }}
          aws-region: ${{ secrets.PROD_AWS_REGION }}

      - name: Terraform init dev
        if: matrix.environment == 'dev'
        env:
          TF_BACKEND_BUCKET: ${{ secrets.DEV_TF_BACKEND_BUCKET }}
          TF_BACKEND_REGION: ${{ secrets.DEV_TF_BACKEND_REGION }}
        run: |
          terraform -chdir=${{ matrix.terraform_dir }} init \
            -backend-config="bucket=${TF_BACKEND_BUCKET}" \
            -backend-config="region=${TF_BACKEND_REGION}"

      - name: Terraform init production
        if: matrix.environment == 'production'
        env:
          TF_BACKEND_BUCKET: ${{ secrets.PROD_TF_BACKEND_BUCKET }}
          TF_BACKEND_REGION: ${{ secrets.PROD_TF_BACKEND_REGION }}
        run: |
          terraform -chdir=${{ matrix.terraform_dir }} init \
            -backend-config="bucket=${TF_BACKEND_BUCKET}" \
            -backend-config="region=${TF_BACKEND_REGION}"

      - name: Terraform plan
        id: plan
        shell: bash
        run: |
          set +e
          terraform -chdir=${{ matrix.terraform_dir }} plan -out=tfplan -detailed-exitcode
          status=$?
          set -e
          echo "exitcode=${status}" >> "$GITHUB_OUTPUT"
          if [ "${status}" -eq 1 ]; then
            echo "plan_failed=true" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "plan_failed=false" >> "$GITHUB_OUTPUT"

      - name: Render safe plan summary
        if: always() && (steps.plan.outputs.exitcode == '0' || steps.plan.outputs.exitcode == '2')
        shell: bash
        run: |
          chmod +x scripts/render-terraform-plan-summary.sh
          terraform -chdir=${{ matrix.terraform_dir }} show -json tfplan \
            | scripts/render-terraform-plan-summary.sh "${{ matrix.environment }}" \
            | tee plan-summary.md
          {
            echo "## CI plan: ${{ matrix.environment }}"
            echo
            cat plan-summary.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload safe plan summary
        if: always() && (steps.plan.outputs.exitcode == '0' || steps.plan.outputs.exitcode == '2')
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ci-plan-summary-${{ matrix.environment }}
          path: plan-summary.md
          retention-days: 7

      - name: Sticky PR plan comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const fs = require("fs");
            const env = "${{ matrix.environment }}";
            const marker = `<!-- terraform-plan:${env} -->`;
            const exitcode = "${{ steps.plan.outputs.exitcode }}";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            let body;
            if (exitcode === "1" || exitcode === "") {
              body = [
                marker,
                `### Terraform plan: \`${env}\``,
                "",
                "Plan **failed**. See the workflow run for details (no plan data is published).",
                "",
                `[Workflow run](${runUrl})`,
              ].join("\n");
            } else {
              const summary = fs.readFileSync("plan-summary.md", "utf8");
              body = [
                marker,
                summary,
                "",
                `[Workflow run](${runUrl})`,
              ].join("\n");
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const existing = comments.find(
              (c) =>
                c.user &&
                (c.user.type === "Bot" || c.user.login.endsWith("[bot]")) &&
                c.body &&
                c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
