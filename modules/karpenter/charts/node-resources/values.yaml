ec2nodeclassName: default
nodeRoleName: ""
discoveryTagValue: ""
amiAlias: al2023@v20260709
spotPreferred: false
expireAfter: 720h
terminationGracePeriod: 1h
consolidateAfter: 0s
cpuLimit: "32"
memoryLimit: "64Gi"
# Root EBS for Karpenter nodes (encrypted gp3; matches live stateless-spot roots).
rootVolumeSize: 20Gi
# kubelet maxPods (null/omit = AMI default). Pair with VPC CNI prefix delegation.
maxPods: 110

# NodePool scheduling preference weights (higher = preferred first).
nodepoolWeights:
  spot: 100
  onDemand: 10

# Per-NodePool voluntary disruption limits (Karpenter budget nodes string).
# Migration freeze: "0". Steady state: "1" per pool (not a global cluster budget).
disruptionBudgetNodes:
  spot: "0"
  onDemand: "0"

# Taints applied to both NodePools (hard placement for classified stateless pods).
nodeTaints: []

# List of requirement objects: { key, operator, values }
spotRequirements: []
onDemandRequirements: []
# Change trail: @hungxqt - 2026-07-22 - Add rootVolumeSize for encrypted Karpenter root EBS.
