apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: {{ .Values.ec2nodeclassName }}
spec:
  role: {{ .Values.nodeRoleName | quote }}
  amiSelectorTerms:
    - alias: {{ .Values.amiAlias | quote }}
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: {{ .Values.discoveryTagValue | quote }}
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: {{ .Values.discoveryTagValue | quote }}
  metadataOptions:
    httpEndpoint: enabled
    httpProtocolIPv6: disabled
    httpPutResponseHopLimit: 2
    httpTokens: required
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: {{ .Values.rootVolumeSize | default "20Gi" }}
        volumeType: gp3
        encrypted: true
        deleteOnTermination: true
  {{- /* maxPods requires VPC CNI prefix delegation for values above ENI secondary-IP defaults */}}
  {{- if .Values.maxPods }}
  kubelet:
    maxPods: {{ .Values.maxPods }}
  {{- end }}
# Change trail: @hungxqt - 2026-07-22 - Explicit encrypted gp3 root volume on EC2NodeClass.
